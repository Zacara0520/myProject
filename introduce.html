<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사이트 소개 - 오늘의 추천도서</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <h1>오늘의 추천도서</h1>
            <div class="search-area">
                <input type="text" id="main-search" placeholder="검색어를 입력하세요">
                <button id="search-btn">검색</button>
            </div>
        </div>
    </header>

    <nav>
        <div class="container">
            <ul style="display: flex; width: 100%;">
                <li><a href="index.html">홈</a></li>
                <li><a href="about.html">사이트 소개</a></li>
                <li><a href="storeLink.html">서점 링크</a></li>
                <li><a href="reviewBoard.html">리뷰 게시판</a></li>
                
                <div id="auth-status-area" style="margin-left: auto; display: flex; gap: 25px;">
                    <li><a href="LogIn.html">회원가입</a></li>
                    <li><a href="LogIn_Page.html">로그인</a></li>
                </div>
            </ul>
        </div>
    </nav>
    
    <div class="container content-wrapper">
        <main>
            <section class="intro-section">
                <h2>오늘의 추천도서를 소개합니다!</h2>
                <p>오늘의 추천도서는 사용자가 다양한 도서를 경험했으면 하는 마음으로 시작되었습니다!</p>
                <p>세상에 있는 수많은 책들 중에서 무엇을 읽을 지 고민될 때, 가볍게 이용해보세요!</p>
            </section>
            
            <section class="board-form" style="margin-top: 20px;">
                <h3>관리자에게 한 마디 (문의 및 제안)</h3>
                <form id="about-form">
                    <input type="text" id="about-visitor-name" placeholder="작성자 성함 또는 닉네임" required>
                    <input type="text" id="about-message" placeholder="사이트에 바라는 점이나 제안을 남겨주세요" required>
                    <button type="submit">의견 보내기</button>
                </form>
            </section>
        </main>

        <aside>
            <div class="widget">
                <h3>간편 로그인</h3>
                <form class="login-form" id="easy-login-form">
                    <input type="text" id="easy-id" placeholder="아이디" required>
                    <input type="password" id="easy-pw" placeholder="비밀번호" required>
                    <button type="submit">접속하기</button>
                    <p style="text-align: center; margin-top: 15px; font-size: 0.85rem;">
                        <a href="LogIn_Page.html" style="color: #9575cd; font-weight: bold;">상세 로그인 페이지로 이동</a>
                    </p>
                </form>
            </div>
            <div class="widget">
                <h3>광고 - 이벤트</h3>
                <div class="ad-banner" id="rolling-banner">5월 1달동안 문학 도서 10% 할인</div>
            </div>
        </aside>
    </div>

    <footer>
        <p>&copy; 2026 today books. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
