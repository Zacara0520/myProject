<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서점 링크 - 오늘의 추천도서</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .bookstore-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .bookstore-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-color: #f3e5f5;
            color: #5e35b1;
            font-size: 1.1rem;
            font-weight: bold;
            text-decoration: none;
            border: 2px solid #d1c4e9;
            border-radius: 15px;
            transition: all 0.3s ease;
            text-align: center;
        }
        .bookstore-btn:hover {
            background-color: #9575cd;
            color: #ffffff;
            border-color: #9575cd;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(103, 58, 183, 0.2);
        }
        .page-description { margin-bottom: 20px; color: #666; }
    </style>
</head>
<body>

    <header>
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <h1>오늘의 추천도서</h1>
            <div class="search-area">
                <input type="text" placeholder="검색어를 입력하세요">
                <button>검색</button>
            </div>
        </div>
    </header>

    <nav>
        <div class="container">
            <ul style="display: flex; width: 100%;">
                <li><a href="index.html">홈</a></li>
                <li><a href="introduce.html">사이트 소개</a></li>
                <li><a href="storeLink.html">서점 링크</a></li>
                <li><a href="reviewBoard.html">리뷰 게시판</a></li>
                
                <div id="auth-status-area" style="margin-left: auto; display: flex; gap: 25px;">
                    <li><a href="LogIn.html">회원가입</a></li>
                    <li><a href="LogIn_Page.html">로그인</a></li>
                </div>
                
            </ul>
        </div>
    </nav>

    <div class="container content-wrapper">
        <main style="flex: 1;">
            <section class="intro-section">
                <h2>국내 온라인 서점 안내</h2>
                <p class="page-description">버튼을 눌러 원하시는 도서를 빠르게 찾아보세요!</p>
                
                <div class="bookstore-grid">
                    <a href="https://www.kyobobook.co.kr" target="_blank" class="bookstore-btn">교보문고</a>
                    <a href="http://www.yes24.com" target="_blank" class="bookstore-btn">YES24</a>
                    <a href="https://www.aladin.co.kr" target="_blank" class="bookstore-btn">알라딘</a>
                    <a href="https://www.ypbooks.co.kr" target="_blank" class="bookstore-btn">영풍문고</a>
                </div>
            </section>
        </main>
    </div>

    <footer>
        <p>&copy; 2026 today books. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
