<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - 오늘의 추천도서</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page-body">

    <div class="login-container" style="width: 550px;">
        <h2>회원가입</h2>

        <form id="join-form">
            <div class="input-group">
                <label>아이디*</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="join-id" placeholder="영문/숫자 4~12자리" style="flex: 1;">
                    <button type="button" id="btn-check-id" style="width: 100px; background:#673ab7; color:#fff; border:none; border-radius:10px; cursor:pointer;">중복확인</button>
                </div>
                <span class="error-msg" id="err-id"></span>
            </div>

            <div class="input-group">
                <label>비밀번호*</label>
                <input type="password" id="join-pw" placeholder="8자리 이상, 영문+숫자 조합">
                <span class="error-msg" id="err-pw"></span>
            </div>

            <div class="input-group">
                <label>비밀번호확인*</label>
                <input type="password" id="join-pw-confirm" placeholder="비밀번호를 한번 더 입력해주세요">
                <span class="error-msg" id="err-pw-confirm"></span>
            </div>

            <div class="input-group">
                <label>이름*</label>
                <input type="text" id="join-name" placeholder="이름을 입력해 주세요">
                <span class="error-msg" id="err-name"></span>
            </div>

            <div class="input-group">
                <label>이메일*</label>
                <div style="display: flex; align-items: center; gap: 5px;">
                    <input type="text" id="email-user" placeholder="예: abcdef" style="flex: 1;">
                    <span>@</span>
                    <select id="email-domain" style="flex: 1;">
                        <option value="" selected disabled>선택하기</option>
                        <option value="naver.com">naver.com</option>
                        <option value="gmail.com">gmail.com</option>
                        <option value="hanmail.net">hanmail.net</option>
                        <option value="직접입력">직접입력</option>
                    </select>
                </div>
                <input type="text" id="email-direct" placeholder="도메인 직접 입력" style="margin-top: 5px; display: none;">
                <span class="error-msg" id="err-email"></span>
            </div>

            <div class="input-group">
                <label>휴대폰*</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="join-phone" placeholder="숫자만 입력해주세요." style="flex: 1;">
                    <button type="button" class="login-btn-full" style="width: 130px; font-size:0.9rem; padding: 0;" id="btn-phone-auth">인증번호 받기</button>
                </div>
                <span class="error-msg" id="err-phone"></span>
            </div>

            <div class="input-group" style="text-align: left;">
                <label>성별</label><br>
                <input type="radio" name="gender" value="male" style="width:auto;"> 남자 &nbsp;&nbsp;
                <input type="radio" name="gender" value="female" style="width:auto;"> 여자 &nbsp;&nbsp;
                <input type="radio" name="gender" value="none" checked style="width:auto;"> 선택안함
            </div>

            <div class="input-group">
                <label>이용약관동의*</label>
                <div style="background: #fdfbff; padding: 15px; border: 1px solid #e1bee7; border-radius: 10px; font-size: 0.9rem; color: #555;">
                    <input type="checkbox" id="check-all" style="width: auto;"> <strong>전체 동의합니다.</strong><br><hr style="margin: 10px 0; border: 0; border-top: 1px solid #ede7f6;">
                    <input type="checkbox" class="sub-check vital" id="chk1" style="width: auto;"> 이용약관 동의 (필수)<br>
                    <input type="checkbox" class="sub-check vital" id="chk2" style="width: auto;"> 개인정보 수집・이용 동의 (필수)<br>
                    <input type="checkbox" class="sub-check" style="width: auto;"> 마케팅 광고 활용 동의 (선택)<br>
                    <input type="checkbox" class="sub-check vital" id="chk3" style="width: auto;"> 본인은 만 14세 이상입니다. (필수)
                </div>
                <span class="error-msg" id="err-agree"></span>
            </div>

            <button type="submit" style="width: 100%; padding: 15px; background: #673ab7; color: #fff; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px;">
                가입하기
            </button>
        </form>

        <div style="margin-top: 30px; text-align: center; border-top: 1px solid #eee; padding-top: 20px;">
            <a href="index.html" style="display: inline-block; padding: 10px 20px; background-color: #f1f3f5; color: #495057; font-size: 0.9rem; font-weight: 500; border-radius: 8px; text-decoration: none; transition: all 0.2s;">
                ← 메인페이지로 돌아가기
            </a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
